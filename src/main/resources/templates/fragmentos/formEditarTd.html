<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="formEditarTd-seccion">
  <form th:action="@{/editarTd}" th:object="${tdEditar}" method="post">
    <div class="modal-header">
      <h5 class="modal-title" id="modalTdLabel">Editar Tipo de Documento</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <input type="hidden" th:field="*{idTd}" />

      <div class="input-group mb-2">
        <span class="input-group-text">Código</span>
        <input th:field="*{codTd}" class="form-control"
               style="text-transform: uppercase;"
               oninput="this.value = this.value.toUpperCase()" required>
      </div>

      <div class="input-group mb-2">
        <span class="input-group-text">Descripción</span>
        <input th:field="*{desTd}" class="form-control" required>
      </div>

      <div class="input-group mb-2">
        <span class="input-group-text">Tipo</span>
        <div class="form-check form-check-inline ms-2">
          <input class="form-check-input" type="radio" th:field="*{ingsal}" value="1" required>
          <label class="form-check-label">Ingreso</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" th:field="*{ingsal}" value="0" required>
          <label class="form-check-label">Salida</label>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button type="submit" class="btn btn-success btn-sm">Guardar</button>
      <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
    </div>
  </form>
</div>
</body>
</html>
