<!-- fragmentos/alertas.html -->
<div th:fragment="alertas-seccion">
    <!-- Mensaje de éxito -->
    <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show mt-2" role="alert">
        <span th:text="${mensaje}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Mensaje de error -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-2" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>
