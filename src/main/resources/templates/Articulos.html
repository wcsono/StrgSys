<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Artículos')}"></head>
<body>

<!-- Navegación principal -->
<div th:replace="~{fragmentos/navegacion-principal::navegacion-principal-seccion}" th:remove="tag"></div>

<!-- Contenido principal -->
<div class="container-fluid mt-4">

    <!-- Mensajes de éxito / error -->
    <div th:replace="~{fragmentos/alertas :: alertas-seccion}"></div>

    <!-- Paneles -->
    <div class="row">
        <!-- Panel izquierdo: listado de artículos -->
        <div class="col-md-7 tabla-articulos">
            <h3 class="text-primary text-center">Listado de Artículos</h3>
            <table class="table table-striped">
                <thead class="table-primary text-center">
                <tr>
                    <th>ID</th>
                    <th>Código</th>
                    <th>Descripción</th>
                    <th>Ubicación</th>
                    <th>U.D.M.</th>
                    <th>Stock</th>
                    <th>
                        <div class="container">
                            <div class="d-flex flex-column align-items-center mt-3 gap-2">
                                <!-- Botón de búsqueda -->
                                <button class="btn btn-outline-primary btn-sm d-flex align-items-center justify-content-center"
                                        type="button" data-bs-toggle="offcanvas" data-bs-target="#filtroArticulosOffcanvas">
                                    <i class="bi bi-binoculars me-1"></i> Buscar
                                </button>

                                <!-- Botón agregar artículo (una sola línea) -->
                                <a href="/agregarArt"
                                   class="btn btn-sm btn-primary rounded d-flex align-items-center justify-content-center"
                                   style="white-space: nowrap;">
                                    <i class="bi bi-file-earmark-plus me-1"></i> Agregar Artículo
                                </a>
                            </div>
                        </div>
                    </th>
                </tr>
                </thead>
                <tbody th:if="${#lists.isEmpty(articulos)}">
                <tr>
                    <td colspan="6" class="text-center text-muted">
                        No se encontraron artículos para los criterios seleccionados.
                    </td>
                </tr>
                <tbody th:unless="${#lists.isEmpty(articulos)}">
                <tr th:each="articulo : ${articulos}" class="text-center">
                    <td th:text="${articulo.idArt}"></td>
                    <td th:text="${articulo.codArt}"></td>
                    <td th:text="${articulo.desArt}"></td>
                    <td th:text="${articulo.ubiArt}"></td>
                    <td th:text="${articulo.udm}"></td>
                    <td th:text="${articulo.stk}"></td>
                    <td>
                        <div class="d-flex justify-content-center gap-2">
                            <!-- Editar -->
                            <a th:href="@{/editarArt/{id}(id=${articulo.idArt})}"
                               class="btn btn-dark btn-sm" title="Editar">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <!-- Eliminar -->
                            <a th:href="@{/eliminar/{id}(id=${articulo.idArt})}"
                               class="btn btn-danger btn-sm" title="Eliminar">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Panel derecho: detalle del artículo -->
        <div class="col-md-5 panel-derecho" id="detallePanel">
            <div id="alertContainer"></div>
            <div id="detalleContenido" class="mt-0 fade-in">
                <!-- Aquí se inyecta el detalle con articulo.js -->
            </div>
        </div>
    </div>
</div>

<!-- Offcanvas lateral derecho -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="filtroArticulosOffcanvas">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Filtros de Artículos</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <form th:action="@{/articulos}" method="get" class="d-flex flex-column gap-3">

            <!-- Filtro por código -->
            <div class="input-group mb-1">
                <span class="input-group-text">Código</span>
                <input id="codArt" name="codArt" class="form-control" aria-label="Código"
                       style="text-transform: uppercase;"
                       oninput="this.value = this.value.toUpperCase();">
            </div>

            <!-- Filtro por descripción -->
            <div class="input-group mb-1">
                <span class="input-group-text">Descripción</span>
                <input id="desArt" name="desArt" class="form-control" aria-label="Descripción"
                       style="text-transform: uppercase;"
                       oninput="this.value = this.value.toUpperCase();">
            </div>
            <!-- Filtro por ubicación -->
            <div class="input-group mb-1">
                <span class="input-group-text">Ubicación</span>
                <input id="ubiArt" name="ubiArt" class="form-control" aria-label="Ubicación"
                       style="text-transform: uppercase;"
                       oninput="this.value = this.value.toUpperCase();">
            </div>


            <!-- Botón aplicar filtros -->
            <button type="submit" class="btn btn-primary mt-2">
                <i class="bi bi-search"></i> Aplicar Filtros
            </button>
        </form>
    </div>
</div>

<!-- Scripts -->
<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>
<script th:src="@{/js/articulo.js}"></script>
</body>
</html>
