<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Articulos')}"></head>
<body>

<!-- Navegación principal -->
<div th:replace="~{fragmentos/navegacion-principal::navegacion-principal-seccion}" th:remove="tag"></div>

<!-- Contenido principal -->
<div class="container mt-4">

    <!-- Mensajes de éxito / error -->
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
    </div>

    <!-- Título -->
    <div class="row text-primary">
        <div class="col-8 text-center">
            <h2>Artículos</h2>
        </div>
    </div>

    <!-- Tabla de artículos -->
    <div class="row d-flex mt-3">
        <div class="col-8 mt-2">
            <table class="table table-striped">
                <thead class="table-primary text-center">
                <tr>
                    <th>Id</th>
                    <th>Código</th>
                    <th>Descripción</th>
                    <th>U.D.M.</th>
                    <th>Qty.</th>
                    <th>
                        <div class="d-flex justify-content-center mt-3">
                            <a href="/agregarArt" class="btn btn-sm btn-primary rounded d-flex align-items-center justify-content-center">
                                <i class="bi bi-file-earmark-plus me-1"></i> Agregar Articulo
                            </a>
                        </div>
                    </th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="articulo : ${articulos}" class="text-center">
                    <td th:text="${articulo.idArt}"></td>
                    <td th:text="${articulo.codArt}"></td>
                    <td th:text="${articulo.desArt}"></td>
                    <td th:text="${articulo.udm}"></td>
                    <td th:text="${articulo.stk}"></td>
                    <td class="text-center">
                        <div class="d-flex justify-content-center gap-2">
                            <a th:href="@{/editarArt/{id}(id=${articulo.idArt})}"
                            class="btn btn-dark btn-sm me-2" title="Editar registro">
                                <i class="bi bi-pencil-square"></i>
                            </a>
                            <a th:href="@{/eliminar/{id}(id=${articulo.idArt})}"
                               class="btn btn-danger btn-sm" aria-label="Eliminar artículo" title="Eliminar registro">
                                <i class="bi bi-trash"></i>
                            </a>
                        </div>
                    </td>
                </tr>


                </tbody>
            </table>

            <!-- Botón circular debajo de la tabla, alineado a la derecha -->

        </div>
    </div>
</div>

<!-- Modales -->
<div th:replace="~{fragmentos/modalArtAgregar::modalArtAgregar-seccion}"></div>

<div class="modal fade" id="modalArticulo" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" id="modalContenido">
            <!-- Aquí se inyecta el fragmento modalVer -->
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/articulo.js}"></script>

<!-- Inicializar tooltips -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    });
    function cargarModal(idArt) {
    $.get("/ver/" + idArt, function (html) {
        $("#modalContenido").html(html);
        const modal = new bootstrap.Modal(document.getElementById("modalArticulo"));
        modal.show();
    }).fail(function () {
        alert("Error al cargar el artículo.");
    });
}
</script>
<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"/>
</body>
</html>
