<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Agregar Articulo')}"></head>
<body>

<!-- Navegación principal -->
<div th:replace="~{fragmentos/navegacion-principal::navegacion-principal-seccion}" th:remove="tag"></div>

<div class="container">
    <div class="text-center my-4">
        <h3>Agregar Articulo</h3>
    </div>

    <!-- Centramos el formulario -->
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- modelAttribute = articuloForma -->
            <form th:action="@{/guardarAgregarArt}" th:object="${articuloForma}" method="post">
                <input type="hidden" id="estArt" name="estArt" value="false">
                <!-- Código -->
                <div class="input-group mb-3">
                    <span class="input-group-text">Código</span>
                    <input id="codArt" name="codArt" class="form-control" aria-label="codigo" style="text-transform: uppercase;"  oninput="this.value = this.value.toUpperCase();">
                </div>

                <!-- Descripción -->
                <div class="input-group mb-3">
                    <span class="input-group-text">Descripción</span>
                    <input id="desArt" name="desArt" class="form-control" aria-label="descripcion" style="text-transform: uppercase;"  oninput="this.value = this.value.toUpperCase();">
                </div>
                <!-- Ubicacion -->
                <div class="input-group mb-3">
                    <span class="input-group-text">Ubicación</span>
                    <input id="ubiArt" name="dubiArt" class="form-control" aria-label="descripcion" style="text-transform: uppercase;"  oninput="this.value = this.value.toUpperCase();">
                </div>

                <!-- udm -->
                <div class="input-group mb-3">
                    <span class="input-group-text">U.D.M.</span>
                    <input id="udm" name="udm" class="form-control" aria-label="unidadDeMedida" style="text-transform: uppercase;"  oninput="this.value = this.value.toUpperCase();">
                </div>

                <!-- fecha Registro -->
                <div class="input-group mb-3">
                    <span class="input-group-text">FechaRegistro</span>
                    <input type="date" id="fecReg" name="fecReg" class="form-control" aria-label="fechaRegistro" style="text-transform: uppercase;"  oninput="this.value = this.value.toUpperCase();">
                </div>

                <!-- costo -->
                <div class="input-group mb-3">
                    <span class="input-group-text">Costo</span>
                    <input type="number" step="0.01" id="costo" name="costo"
                           class="form-control" aria-label="costo"
                           inputmode="decimal" lang="en">
                </div>

                <!-- Stock Inicial -->
                <div class="input-group mb-3">
                    <span class="input-group-text">Stock Inicial</span>
                    <input type="number"  id="stk" name="stk"
                           class="form-control" aria-label="stockInicial">
                </div>


                </div>

        <!-- Botón + mensaje de error -->
        <div class="text-center">
            <button id="btnAgregar" type="submit" class="btn btn-primary btn-sm me-3">
                <i class="bi bi-database-add me-1"></i>Agregar
            </button>
            <a th:href="@{articulos}" class="btn btn-secondary btn-sm">
                <i class="bi bi-arrow-return-left me-1"></i>Regresar
            </a>

            <!-- Mensaje de error debajo del botón -->
            <div id="errorCodigo" class="mt-2" style="display:none;">
                <span class="badge bg-danger">Error!! Código de Artículo ya registrado</span>
            </div>
            <div th:if="${errorCodigo}" class="mt-2">
                <span class="badge bg-danger" th:text="${errorCodigo}"></span>
            </div>
        </div>

        </form>
        </div>
    </div>
</div>

<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"></div>
<script th:src="@{/js/articulo.js}"></script>

</body>
</html>
