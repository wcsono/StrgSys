<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos/cabecero::cabecero-seccion(titulo='Reportes')}">
    <!-- Tus estilos personalizados -->
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h2 class="text-center mb-4 bg-primary text-white p-3 rounded shadow">
        Módulo de Reportes
    </h2>

    <ul class="nav nav-pills justify-content-center mb-3" id="reportesTabs" role="tablist">
        <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#inventario">Inventario Actual</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#movimientos">Movimientos</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#alertas">Alertas</button>
        </li>
        <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#graficos">Gráficos</button>
        </li>
    </ul>

    <div class="tab-content mt-3">
        <!-- Inventario -->
        <div class="tab-pane fade show active" id="inventario">
            <div class="card shadow">
                <div class="card-header bg-info text-white text-center">
                    <h3>Inventario Actual</h3>
                </div>
                <div class="card-body">
                    <table class="table table-hover table-bordered" id="tablaInventario">
                        <thead class="table-dark">
                        <tr>
                            <th id="th-codArt" class="sortable" onclick="ordenarPor('codArt')">
                                Código <span id="icon-codArt" class="both"></span>
                            </th>
                            <th id="th-desArt" class="sortable" onclick="ordenarPor('desArt')">
                                Descripción <span id="icon-desArt" class="both"></span>
                            </th>
                            <th id="th-stk" class="sortable" onclick="ordenarPor('stk')">
                                Stock <span id="icon-stk" class="both"></span>
                            </th>
                            <th>Costo Unitario</th>
                            <th>Valor Total</th>
                        </tr>
                        </thead>
                        <tbody id="cuerpoInventario">
                        <tr th:each="art : ${articulos}">
                            <td th:text="${art.codArt}"></td>
                            <td th:text="${art.desArt}"></td>
                            <td th:text="${art.stk}"></td>
                            <td th:text="${art.costo}" class="costo"></td>
                            <td th:text="${art.stk * art.costo}" class="costo"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Movimientos -->
        <div class="tab-pane fade" id="movimientos">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white text-center">
                    <h3>Kardex Mensual</h3>
                </div>
                <div class="card-body">
                    <div class="mb-3 text-center">
                        <label>
                            <input type="checkbox" id="chkSoloMovimientos" onchange="filtrarMovimientos()">
                            Mostrar solo artículos con movimiento
                        </label>
                    </div>
                    <table class="table table-bordered" id="tablaMovimientos">
                        <thead class="table-dark">
                        <tr>
                            <th>Artículo</th>
                            <th>Año</th>
                            <th>Mes</th>
                            <th>Entradas</th>
                            <th>Salidas</th>
                            <th>Saldo Final</th>
                            <th>Valor Movido</th>
                        </tr>
                        </thead>
                        <tbody id="cuerpoMovimientos"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Alertas -->
        <div class="tab-pane fade" id="alertas">
            <div class="alert alert-danger mt-3">Stock crítico: Artículo X con solo 2 unidades disponibles.</div>
            <div class="alert alert-warning mt-3">Stock bajo: Artículo Y con 5 unidades.</div>
        </div>

        <!-- Gráficos -->
        <div class="tab-pane fade" id="graficos">
            <div class="card shadow mt-3">
                <div class="card-header bg-success text-white">Gráficos de Inventario</div>
                <div class="card-body">
                    <canvas id="graficoEntradasSalidas" width="300" height="150"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragmentos/pie-pagina::pie-pagina-seccion}"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const articulos = /*[[${articulos}]]*/ [];
</script>
<script src="/js/reportes.js"></script>
</body>
</html>
